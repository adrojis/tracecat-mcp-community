name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'LICENSE'
      - '.gitignore'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'LICENSE'
      - '.gitignore'

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20, 22]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run tests
        run: npm test

      - name: Verify dist output
        run: |
          test -f dist/index.js || (echo "Missing dist/index.js" && exit 1)
          head -1 dist/index.js | grep -q "#!/usr/bin/env node" || (echo "Missing shebang" && exit 1)
          echo "Build output verified"

      - name: Test MCP handshake
        run: |
          echo '{"jsonrpc":"2.0","id":1,"method":"initialize","params":{"protocolVersion":"2024-11-05","capabilities":{},"clientInfo":{"name":"ci","version":"1.0"}}}' \
            | timeout 5 node dist/index.js 2>/dev/null \
            | grep -q '"name":"tracecat"' \
            && echo "MCP handshake OK" \
            || (echo "MCP handshake failed" && exit 1)

  docker:
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t tracecat-mcp:test .

      - name: Verify Docker image
        run: |
          echo '{"jsonrpc":"2.0","id":1,"method":"initialize","params":{"protocolVersion":"2024-11-05","capabilities":{},"clientInfo":{"name":"ci","version":"1.0"}}}' \
            | docker run -i --rm tracecat-mcp:test 2>/dev/null \
            | grep -q '"name":"tracecat"' \
            && echo "Docker MCP handshake OK" \
            || (echo "Docker MCP handshake failed" && exit 1)
